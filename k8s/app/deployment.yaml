apiVersion: apps/v1
kind: Deployment
metadata:
  name: dscommerce-deployment
spec:
  replicas: 4
  selector:
    matchLabels:
      app: dscommerce
  template:
    metadata:
      labels:
        app: dscommerce
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: dscommerce
          image: gxnm/dscommerce:1.3
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
          ports:
            - containerPort: 8080

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5